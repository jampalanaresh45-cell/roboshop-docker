services:
  catalogue:
    build:
      context: ./catalogue
      dockerfile: Dockerfile
    image: naresh1567/catalogue:v1
    container_name: catalogue
    depends_on:
    - mongodb
  mongodb: # --name mongodb
    build: ./mongodb
    image: naresh1567/mongo:7.0
    container_name: mongodb
    volumes:
    - mongodb:/data/db
  redis:
    image: redis:7.0
    container_name: redis
    volumes:
    - redis:/data
  mysql:
    build: ./mysql
    image: mysql:v1
    container_name: mysql
    volumes:
    - mysql:/var/lib/mysql
  rabbitmq:
    image: rabbitmq:3
    container_name: rabbitmq
    volumes:
    - rabbitmq:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: roboshop123
  user:
    build: 
      context: ./user
      dockerfile: Dockerfile
    image: naresh1567/user:v1
    container_name: user
    depends_on:
    - mongodb
    - redis
  cart:
    build: ./cart
    image: naresh1567/cart:v1
    container_name: cart
    depends_on:
    - redis
    - catalogue
  shipping:
    build: ./shipping
    image: naresh1567/shipping:v1
    container_name: shipping
    depends_on:
    - mysql
    - cart
  payment:
    build: ./payment
    image: naresh1567/payment:v1
    container_name: payment
    depends_on:
    - rabbitmq
    - cart
    - user
  frontend:
    image: naresh1567/frontend:v1
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
    - catalogue
    - user
    - cart
    - shipping
    - payment
   
networks:
  default: 
    driver: bridge
    name: roboshop
    external: false ## true if you have created network manually
volumes:
  mongodb:
  redis:
  mysql:
  rabbitmq:



      